  <title>Ceetiq - Smart Todo App</title>
  <link rel="stylesheet" href="styles/todo-header.css">
  <link rel="stylesheet" href="styles/todo-app.css">
 
</head>
<body>
  <div class="header">
    <div class="left-section">
    <img src="Images/task-image.png" alt="" class="task-image">
    <div class="brand-name">Cee<span>tiq</span></div>
    </div>

    <div class="right-section">
    <button class="js-dark-mode-toggle dark-mode-button">
    <img src="Images/dark-mode.png" alt="" class="dark-mode-image">
    </button>
    </div>
    
  </div>

  <div class="container">
   <div class="todo-heading">Todos</div>

    <div class="todo-details">
      <input type="text" class="text-input js-text-input" placeholder="write your next win...">
    <button class="add-button js-add-button"> Add</button>
    </div>
    <div class="task-list">Tasklist</div>

    <div class="js-display-page display-page"></div>

  
     <div class="clear-completed-container">
    <button class="js-clear-completed clear-completed">
      Clear Completed 
    </button>
  </div>
  
  </div>

  

  <script src="script/todo-app.js" type="module"></script>
</body>
</html>
